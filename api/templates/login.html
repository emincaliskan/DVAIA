<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>DVAIA — Sign in</title>
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0; padding: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #0f1117;
      color: #e7e9ee;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      width: 100%;
      max-width: 380px;
      padding: 2rem 2rem 1.5rem;
      margin: 1rem;
      background: #181c24;
      border: 1px solid #2a2f3a;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.35);
    }
    .card h1 {
      margin: 0 0 0.5rem;
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .card p.subtitle {
      margin: 0 0 1.5rem;
      color: #9aa0ad;
      font-size: 0.9rem;
      line-height: 1.4;
    }
    label {
      display: block;
      font-size: 0.85rem;
      color: #c0c5cf;
      margin-bottom: 0.35rem;
    }
    input[type=password] {
      width: 100%;
      box-sizing: border-box;
      padding: 0.65rem 0.75rem;
      border: 1px solid #2f3542;
      border-radius: 8px;
      background: #0d1017;
      color: #e7e9ee;
      font-size: 0.95rem;
      outline: none;
      transition: border-color .15s ease, box-shadow .15s ease;
    }
    input[type=password]:focus {
      border-color: #6b7cff;
      box-shadow: 0 0 0 3px rgba(107, 124, 255, 0.18);
    }
    button {
      width: 100%;
      margin-top: 1rem;
      padding: 0.7rem 1rem;
      background: #6b7cff;
      color: white;
      border: 0;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s ease;
    }
    button:hover { background: #5667e8; }
    .error {
      margin: 0 0 1rem;
      padding: 0.6rem 0.75rem;
      background: rgba(220, 70, 70, 0.12);
      border: 1px solid rgba(220, 70, 70, 0.35);
      color: #ffb3b3;
      border-radius: 8px;
      font-size: 0.85rem;
    }
    .hint {
      margin-top: 1.2rem;
      font-size: 0.75rem;
      color: #6c7281;
      line-height: 1.5;
    }
    .hint code {
      font-family: "SF Mono", Menlo, Consolas, monospace;
      font-size: 0.72rem;
      background: #0d1017;
      padding: 1px 4px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>DVAIA</h1>
    <p class="subtitle">Damn Vulnerable AI Application &mdash; sign in to continue.</p>

    {% if error %}<div class="error">{{ error }}</div>{% endif %}

    <form method="POST" action="/login" autocomplete="off">
      <input type="hidden" name="next" value="{{ next }}">
      <label for="password">Access password</label>
      <input
        id="password"
        type="password"
        name="password"
        autocomplete="current-password"
        autofocus
        required>
      <button type="submit">Sign in</button>
    </form>

    <p class="hint">
      Authorized security testing only. Access is gated by the shared
      <code>DVAIA_LOGIN_PASSWORD</code> environment variable.
    </p>
  </div>
</body>
</html>
